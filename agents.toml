[agent]
model = "gpt-5.4-mini"
reasoning_effort = "xhigh"

[shell]
default = "approve"
allow_patterns = ["cargo *", "ls *", "pwd", "which *", "date", "uname *"]
deny_patterns = ["rm -rf /*", "rm -rf ~*", "curl * | sh*", "wget * | sh*", "> /dev/sd*"]
default_severity = "medium"
max_output_bytes = 1048576
