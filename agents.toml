[agents.silas]
identity = "silas"

[agents.silas.t1]
model = "gpt-5.4-mini"
reasoning = "medium"
delegation_token_threshold = 12000
delegation_tool_depth = 3

[agents.silas.t2]
model = "gpt-5.4-mini"
reasoning = "low"

[models]
default = "gpt5_mini"

[models.catalog.gpt5_mini]
provider = "openai"
model = "gpt-5.4-mini"
caps = ["fast", "cheap", "reasoning"]
context_window = 128000
cost_tier = "cheap"
cost_unit = 1
enabled = true

[models.routes.code_review]
requires = ["code_review"]
prefer = ["gpt5_mini"]

[shell]
default = "approve"
allow_patterns = ["cargo *", "ls *", "pwd", "which *", "date", "uname *"]
deny_patterns = ["rm -rf /*", "rm -rf ~*", "curl * | sh*", "wget * | sh*", "> /dev/sd*"]
default_severity = "medium"
max_output_bytes = 1048576

[read]
allowed_paths = ["identity-templates"]
max_read_bytes = 65536

[subscriptions]
context_token_budget = 4096
